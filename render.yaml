services:
  - type: web
    name: wmarket-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # ── Required ──────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

      # ── Frontend URL (used for CORS — set to your Vercel app URL) ─────────────
      - key: FRONTEND_URL
        sync: false

      # ── Cloudinary (image uploads) ─────────────────────────────────────────────
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

      # ── Email notifications (optional — Gmail App Password) ───────────────────
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
