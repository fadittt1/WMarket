<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="W Market">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#3a342c"/>
      <stop offset="100%" stop-color="#211d18"/>
    </radialGradient>
  </defs>

  <!-- Badge -->
  <circle cx="512" cy="512" r="496" fill="url(#bg)"/>
  <circle cx="512" cy="512" r="470" fill="none" stroke="#f7f3ea" stroke-opacity="0.10" stroke-width="6"/>

  <!-- Stylised W -->
  <path d="M300 312 L432 628 L512 452 L592 628 L724 312"
        fill="none" stroke="#f7f3ea" stroke-width="78"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- MARKET wordmark -->
  <text x="512" y="822" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="138" letter-spacing="14" fill="#f7f3ea">MARKET</text>

  <!-- Laurel branches (right side, mirrored for left) -->
  <g fill="#f7f3ea">
    <g id="branch">
      <path d="M512 884 Q664 866 742 712 Q772 652 778 590"
            fill="none" stroke="#f7f3ea" stroke-width="9" stroke-linecap="round"/>
      <ellipse cx="556" cy="868" rx="30" ry="12" transform="rotate(-18 556 868)"/>
      <ellipse cx="600" cy="846" rx="32" ry="13" transform="rotate(-30 600 846)"/>
      <ellipse cx="642" cy="816" rx="33" ry="13" transform="rotate(-42 642 816)"/>
      <ellipse cx="680" cy="778" rx="33" ry="13" transform="rotate(-54 680 778)"/>
      <ellipse cx="712" cy="732" rx="32" ry="12" transform="rotate(-64 712 732)"/>
      <ellipse cx="740" cy="680" rx="30" ry="12" transform="rotate(-72 740 680)"/>
      <ellipse cx="760" cy="626" rx="27" ry="11" transform="rotate(-80 760 626)"/>
      <ellipse cx="772" cy="576" rx="23" ry="10" transform="rotate(-86 772 576)"/>
      <!-- inner leaves -->
      <ellipse cx="596" cy="884" rx="24" ry="10" transform="rotate(8 596 884)"/>
      <ellipse cx="640" cy="864" rx="25" ry="10" transform="rotate(-6 640 864)"/>
      <ellipse cx="682" cy="836" rx="25" ry="10" transform="rotate(-20 682 836)"/>
      <ellipse cx="716" cy="800" rx="24" ry="10" transform="rotate(-34 716 800)"/>
    </g>
    <use href="#branch" transform="matrix(-1 0 0 1 1024 0)"/>
  </g>
</svg>
